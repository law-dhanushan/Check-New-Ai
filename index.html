<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Court Role Book - Daily Court List Management" />
  <title>Court Role Book — Daily Court List</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="stylesheet" href="style.css" />

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <header>
    <h1>📋 Court Role Book</h1>
    <div class="top-controls">
      <div>
        <label for="importFile">📁 Import File</label>
        <input id="importFile" type="file" accept=".xlsx,.xls,.csv" title="Import Excel or CSV file" />
        <button id="importBtn">Import</button>

        <input id="gsUrl" type="text" placeholder="Paste Google Sheets CSV export URL..." title="Google Sheets CSV URL" />
        <button id="importGsBtn">📊 Sync Sheet</button>
        <label style="margin-left: 8px;">
          <input type="checkbox" id="autoSync" title="Enable automatic syncing" />
          Auto-sync
        </label>
        <input id="autoInterval" type="number" min="1" value="15" style="width: 70px;" title="Minutes between syncs" />
      </div>
      <div>
        <input id="searchCase" type="text" placeholder="🔍 Search Case Number..." />
        <button id="searchBtn">Search</button>
      </div>
    </div>
  </header>

  <main>
    <!-- Calendar Section -->
    <section id="calendarSection" class="card">
      <div class="month-nav">
        <button id="prevMonth" title="Previous month">&lt;</button>
        <div id="monthLabel"></div>
        <button id="nextMonth" title="Next month">&gt;</button>
      </div>
      <div id="calendar"></div>
    </section>

    <!-- Case List Section -->
    <section id="listSection" class="card">
      <h2 id="selectedDateLabel">📅 Select a date</h2>
      <div id="exports" style="display: none;">
        <button id="exportExcel" title="Download as Excel file">📊 Export Excel</button>
        <button id="exportPdf" title="Download as PDF">📄 Export PDF</button>
        <button id="exportDoc" title="Download as Word document">📝 Export Word</button>
      </div>
      <div id="caseLists"></div>
    </section>

    <!-- Add/Update Case Section -->
    <section id="addCaseSection" class="card">
      <h3>➕ Add / Update Case</h3>
      <form id="addCaseForm">
        <label>
          Case Number <span style="color: #ef4444;">*</span>
          <input id="caseNumber" type="text" required placeholder="e.g., CASE-2024-001" />
        </label>
        <label>
          Next Date (dd/mm/yyyy) <span style="color: #ef4444;">*</span>
          <input id="nextDate" type="text" placeholder="DD/MM/YYYY" required />
        </label>
        <label>
          Next Step
          <select id="nextStep">
            <option>Trial</option>
            <option>Defense Trial</option>
            <option>Submission</option>
            <option>Argument/Inquiry</option>
            <option>Calling</option>
          </select>
        </label>
        <button type="submit">💾 Save Case</button>
      </form>

      <hr />

      <h3>📜 Case History / Details</h3>
      <div id="caseDetails"></div>
    </section>
  </main>

  <!-- Modal for inline update -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <h4>✏️ Update Case</h4>
      <form id="modalForm">
        <div>
          <strong id="modalCase"></strong>
        </div>
        <label>
          New Next Date
          <input id="modalDate" type="text" placeholder="DD/MM/YYYY" required />
        </label>
        <label>
          New Next Step
          <select id="modalStep">
            <option>Trial</option>
            <option>Defense Trial</option>
            <option>Submission</option>
            <option>Argument/Inquiry</option>
            <option>Calling</option>
          </select>
        </label>
        <div class="modal-actions">
          <button type="submit">💾 Save</button>
          <button type="button" id="modalClose">❌ Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <footer>
    <small>💡 Save this page to your phone (Add to Home screen / Install) to use as an app. All data is stored locally.</small>
  </footer>

  <script src="app.js"></script>
</body>
</html>
